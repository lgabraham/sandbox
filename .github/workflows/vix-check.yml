name: VIX Alert

on:
  schedule:
    # Once per weekday at 14:30 UTC — around the 9:30am ET market open, so the
    # alert lands early in the morning (6:30am PST / 7:30am PDT) when it's
    # actionable. After the open in both EST and EDT, so the reading is fresh.
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

# Avoid overlapping runs racing on the history commit.
concurrency:
  group: vix-alert
  cancel-in-progress: false

jobs:
  check-vix:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run VIX checker
        env:
          VIX_THRESHOLD: "35"
          ALERT_ASSIGNEE: "lgabraham"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: python vix_alert/vix_checker.py --check
